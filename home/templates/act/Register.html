{% extends "act/base.html" %}
{% block title %}Register - Bulk Email Sender{% endblock %}
{% load static %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
  :root {
    --primary: #00f2ff;
    --secondary: #7000ff;
    --bg-dark: #020617;
    --glass-bg: rgba(15, 23, 42, 0.7);
    --glass-border: rgba(255, 255, 255, 0.1);
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    --neon-glow: 0 0 15px rgba(0, 242, 255, 0.4);
  }

  body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    background: radial-gradient(circle at center, #0a0f2e 0%, #020617 100%);
    font-family: 'Outfit', sans-serif;
    color: var(--text-main);
    overflow-x: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 0;
    position: relative;
  }
  
  body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: url('https://www.transparenttextures.com/patterns/cubes.png');
    opacity: 0.03;
    pointer-events: none;
    z-index: 0;
  }

  /* Animated Background Blobs */
  .bg-blobs {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    overflow: hidden;
  }

  .blob {
    position: absolute;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(0, 242, 255, 0.15) 0%, rgba(112, 0, 255, 0.05) 100%);
    filter: blur(100px);
    border-radius: 50%;
    animation: move 20s infinite alternate cubic-bezier(0.45, 0, 0.55, 1);
    mix-blend-mode: screen;
  }

  .blob-1 { top: -10%; left: -10%; background: radial-gradient(circle, rgba(0, 242, 255, 0.2), transparent); }
  .blob-2 { bottom: -10%; right: -10%; background: radial-gradient(circle, rgba(112, 0, 255, 0.2), transparent); animation-delay: -5s; }
  .blob-3 { top: 40%; left: 30%; width: 300px; height: 300px; background: radial-gradient(circle, rgba(0, 242, 255, 0.1), transparent); animation-delay: -10s; }
  .blob-4 { bottom: 20%; left: 10%; width: 400px; height: 400px; background: radial-gradient(circle, rgba(112, 0, 255, 0.1), transparent); animation-delay: -15s; }

  @keyframes move {
    0% { transform: translate(0, 0) scale(1) rotate(0deg); }
    50% { transform: translate(100px, 50px) scale(1.1) rotate(90deg); }
    100% { transform: translate(-50px, 100px) scale(0.9) rotate(180deg); }
  }

  /* Main Container */
  .register-container {
    width: 850px;
    max-width: 95%;
    background: var(--glass-bg);
    backdrop-filter: blur(30px);
    border: 1px solid var(--glass-border);
    border-radius: 28px;
    padding: 50px;
    box-shadow: 0 25px 80px -20px rgba(0, 0, 0, 0.8);
    animation: fadeIn 1s cubic-bezier(0.22, 1, 0.36, 1);
    position: relative;
    overflow: hidden;
    transition: transform 0.4s ease, box-shadow 0.4s ease;
    z-index: 1;
  }

  .register-container:hover {
    transform: translateY(-5px);
    box-shadow: 0 35px 100px -20px rgba(0, 242, 255, 0.15);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Border Animation */
  .register-container::before {
    content: '';
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    border-radius: 28px;
    padding: 2px;
    background: linear-gradient(45deg, transparent, var(--primary), transparent, var(--secondary), transparent);
    background-size: 200% 200%;
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
    animation: borderRotate 5s linear infinite;
    opacity: 0.4;
  }

  @keyframes borderRotate {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .header {
    text-align: center;
    margin-bottom: 40px;
  }

  .header h2 {
    font-size: 2.2rem;
    font-weight: 700;
    margin-bottom: 10px;
    background: linear-gradient(to right, #00f2ff, #7000ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .header p {
    color: var(--text-muted);
    font-size: 1.1rem;
  }

  /* Form Grid */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }

  .full-width {
    grid-column: span 2;
  }

  /* Input Styles */
  .input-wrapper label {
    display: block;
    margin-bottom: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text-muted);
    transition: color 0.3s ease;
  }

  .input-wrapper label .required-star {
    color: #ff4d4d;
    margin-left: 3px;
    font-weight: 800;
  }

  .input-wrapper i {
    position: absolute;
    left: 16px;
    bottom: 15px;
    color: var(--text-muted);
    transition: color 0.3s ease;
  }

  .input-field {
    width: 100%;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    padding: 14px 14px 14px 48px;
    color: var(--text-main);
    font-family: inherit;
    font-size: 1rem;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-sizing: border-box;
  }

  .input-field:focus {
    outline: none;
    border-color: var(--primary);
    background: rgba(255, 255, 255, 0.07);
    box-shadow: 0 0 20px rgba(0, 242, 255, 0.12);
  }

  .input-wrapper:focus-within label {
    color: var(--primary);
  }

  .input-field:focus + i {
    color: var(--primary);
  }

  /* Custom Date Style */
  .input-field[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(1);
    cursor: pointer;
  }

  /* Eye Toggle */
  .toggle-password {
    position: absolute;
    right: 16px;
    bottom: 15px;
    cursor: pointer;
    color: var(--text-muted);
    transition: color 0.3s ease;
  }

  .toggle-password:hover {
    color: var(--primary);
  }

  /* Buttons */
  .btn-submit {
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(90deg, var(--primary), var(--secondary));
    color: #fff;
    font-weight: 700;
    font-size: 1.1rem;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-top: 30px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
  }

  .btn-submit:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(0, 242, 255, 0.3);
  }

  /* Terms Checkbox */
  .terms-check {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 20px;
    color: var(--text-muted);
    font-size: 0.95rem;
  }

  .terms-check input {
    width: 18px;
    height: 18px;
    accent-color: var(--primary);
    cursor: pointer;
  }

  .terms-check a {
    color: var(--primary);
    text-decoration: none;
    font-weight: 600;
  }

  .login-link {
    text-align: center;
    margin-top: 30px;
    color: var(--text-muted);
  }

  .login-link a {
    color: var(--primary);
    text-decoration: none;
    font-weight: 700;
  }

  /* Mobile Responsive */
  @media (max-width: 768px) {
    .form-grid { grid-template-columns: 1fr; }
    .full-width { grid-column: span 1; }
    .register-container { padding: 30px 20px; }
  }
</style>

<div class="bg-blobs">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="blob blob-4"></div>
</div>

<div class="register-container">
  <div class="header">
    <h2>Join BulkMail Pro</h2>
    <p>Create your professional account in seconds.</p>
  </div>

  <form method="POST">
    {% csrf_token %}
    <div class="form-grid">
      <!-- First Name -->
      <div class="input-wrapper">
        <label>First Name <span class="required-star">*</span></label>
        <i class="fas fa-user"></i>
        <input type="text" name="first_name" class="input-field" placeholder="John" required value="{{ first_name }}">
      </div>

      <!-- Last Name -->
      <div class="input-wrapper">
        <label>Last Name <span class="required-star">*</span></label>
        <i class="fas fa-user"></i>
        <input type="text" name="last_name" class="input-field" placeholder="Doe" required value="{{ last_name }}">
      </div>

      <!-- Email Address -->
      <div class="input-wrapper">
        <label>Email Address <span class="required-star">*</span></label>
        <i class="fas fa-envelope"></i>
        <input type="email" name="email" class="input-field" placeholder="john@example.com" required value="{{ email }}">
      </div>

      <!-- Phone Number -->
      <div class="input-wrapper">
        <label>Phone Number <span class="required-star">*</span></label>
        <i class="fas fa-phone"></i>
        <input type="text" name="phone" class="input-field" placeholder="+1 234 567 890" required value="{{ phone }}">
      </div>

      <!-- Organization -->
      <div class="input-wrapper full-width">
        <label>Organization Name <span class="required-star">*</span></label>
        <i class="fas fa-building"></i>
        <input type="text" name="organization" class="input-field" placeholder="Company Inc." required value="{{ organization }}">
      </div>

      <!-- DOB -->
      <div class="input-wrapper full-width">
        <label>Date of Birth <span class="required-star">*</span></label>
        <i class="fas fa-calendar-alt"></i>
        <input type="date" name="date" class="input-field" required value="{{ date_of_birth }}">
      </div>

      <!-- Email Host Password -->
      <div class="input-wrapper full-width">
        <label>Email Host App Password</label>
        <i class="fas fa-key"></i>
        <input type="password" name="passwords" id="host-pass" class="input-field" placeholder="Enter app password (optional)">
        <i class="fas fa-eye toggle-password" onclick="togglePass('host-pass')"></i>
      </div>

      <!-- Password -->
      <div class="input-wrapper">
        <label>Password <span class="required-star">*</span></label>
        <i class="fas fa-lock"></i>
        <input type="password" name="password" id="reg-pass" class="input-field" placeholder="Create password" required>
        <i class="fas fa-eye toggle-password" onclick="togglePass('reg-pass')"></i>
      </div>

      <!-- Confirm Password -->
      <div class="input-wrapper">
        <label>Confirm Password <span class="required-star">*</span></label>
        <i class="fas fa-lock"></i>
        <input type="password" name="confirm_password" id="confirm-pass" class="input-field" placeholder="Confirm password" required>
        <i class="fas fa-eye toggle-password" onclick="togglePass('confirm-pass')"></i>
      </div>
    </div>

    <div class="terms-check">
      <input type="checkbox" id="terms" required>
      <label for="terms">I agree to the <a href="#">Terms of Use</a> and Privacy Policy <span class="required-star">*</span></label>
    </div>

    <button type="submit" class="btn-submit">
      Create Account
    </button>

    <div class="login-link">
      Already have an account? <a href="{% url 'login' %}">Login Now</a>
    </div>
  </form>
</div>

<script>
  function togglePass(id) {
    const field = document.getElementById(id);
    const icon = event.target;
    
    if (field.type === 'password') {
      field.type = 'text';
      icon.classList.remove('fa-eye');
      icon.classList.add('fa-eye-slash');
    } else {
      field.type = 'password';
      icon.classList.remove('fa-eye-slash');
      icon.classList.add('fa-eye');
    }
  }

  // Staggered Entry Animation
  document.querySelectorAll('.input-wrapper').forEach((el, index) => {
    el.style.opacity = '0';
    el.style.transform = 'translateY(15px)';
    setTimeout(() => {
      el.style.transition = 'all 0.4s ease-out';
      el.style.opacity = '1';
      el.style.transform = 'translateY(0)';
    }, 300 + (index * 60));
  });

  // Interactive Background Blobs (Mouse Parallax)
  document.addEventListener('mousemove', (e) => {
    const blobs = document.querySelectorAll('.blob');
    const x = e.clientX;
    const y = e.clientY;

    blobs.forEach((blob, index) => {
      const speed = (index + 1) * 20;
      const moveX = (window.innerWidth / 2 - x) / speed;
      const moveY = (window.innerHeight / 2 - y) / speed;
      
      // Use existing animation position but offset it with mouse
      blob.style.transform = `translate(${moveX}px, ${moveY}px)`;
    });
  });
</script>
{% endblock %}
