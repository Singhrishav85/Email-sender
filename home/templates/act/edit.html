{% extends "act/base.html" %}
{% load static %}

{% block title %}
    Edit Recipient
{% endblock %}

{% block content %}
<style>
  body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top left, #1e293b, #0f172a);
    font-family: 'Inter', sans-serif;
  }

  .form-wrapper {
    backdrop-filter: blur(16px) saturate(180%);
    -webkit-backdrop-filter: blur(16px) saturate(180%);
    background: rgba(30, 41, 59, 0.7);
    padding: 40px;
    border-radius: 24px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    width: 100%;
    max-width: 500px;
    color: #f8fafc;
  }

  .form-title {
    font-size: 1.75rem;
    font-weight: 700;
    background: linear-gradient(to right, #60a5fa, #a855f7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 1.5rem;
  }

  .form-control, .form-select {
    background: rgba(15, 23, 42, 0.6);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: #f8fafc;
    border-radius: 12px;
    padding: 12px 16px;
    transition: all 0.3s ease;
  }

  .form-control:focus, .form-select:focus {
    background: rgba(15, 23, 42, 0.8);
    border-color: #6366f1;
    color: #fff;
    box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
  }

  .form-label {
    font-size: 0.9rem;
    font-weight: 600;
    color: #94a3b8;
    margin-bottom: 0.5rem;
  }

  .btn-custom {
    border-radius: 12px;
    padding: 12px 24px;
    font-weight: 600;
    transition: all 0.3s ease;
    border: none;
  }

  .btn-update {
    background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
    color: white;
    box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.4);
  }

  .btn-update:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.5);
    background: linear-gradient(135deg, #4f46e5 0%, #4338ca 100%);
  }

  .btn-cancel {
    background: rgba(255, 255, 255, 0.05);
    color: #94a3b8;
  }

  .btn-cancel:hover {
    background: rgba(255, 255, 255, 0.1);
    color: #f1f5f9;
  }
</style>

<div class="form-wrapper">
  <h3 class="form-title text-center">Edit Recipient</h3>
  <form method="POST">
    {% csrf_token %}

    <!-- Name -->
    <div class="mb-3">
      <label for="name" class="form-label">Full Name</label>
      <input type="text" class="form-control" id="name" name="name" 
             value="{{ recep.name }}" required>
    </div>

    <!-- Email -->
    <div class="mb-3">
      <label for="email" class="form-label">Email Address</label>
      <input type="email" class="form-control" id="email" name="email" 
             value="{{ recep.email_address }}" required>
    </div>

    <!-- Category -->
    <div class="mb-3">
      <label for="category" class="form-label">Category</label>
      <select class="form-select" id="category" name="category">
        <option value="None" {% if recep.category == "None" %}selected{% endif %}>None</option>
        <option value="Promotional" {% if recep.category == "Promotional" %}selected{% endif %}>Promotional</option>
        <option value="Transactional" {% if recep.category == "Transactional" %}selected{% endif %}>Transactional</option>
        <option value="Personal" {% if recep.category == "Personal" %}selected{% endif %}>Personal</option>
      </select>
    </div>

    <!-- Comments -->
    <div class="mb-3">
      <label for="comments" class="form-label">Comments</label>
      <textarea class="form-control" id="comments" name="comments" rows="3">{{ recep.comment }}</textarea>
    </div>

    <!-- Submit buttons -->
    <div class="d-flex flex-column gap-3 mt-4">
      <button type="submit" class="btn btn-update btn-custom">Update Recipient</button>
      <a href="{% url 'home' %}" class="btn btn-cancel btn-custom text-center">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
